---
- name: python 3.15 install
  hosts: programming
  become: true
  serial: 1
  vars:
    pythonversion: 3.15.0
    pythonversiona: 3.15.0b3

  tasks:
    - name: apt-get update
      ansible.builtin.apt:
        update_cache: yes

    - name: Install a list of packages
      ansible.builtin.apt:
        pkg:
          - build-essential
          - gdb
          - lcov
          - pkg-config
          - libbz2-dev
          - libffi-dev
          - libgdbm-dev
          - libgdbm-compat-dev
          - liblzma-dev
          - libncurses5-dev
          - libreadline6-dev
          - libsqlite3-dev
          - libssl-dev
          - lzma
          - tk-dev
          - uuid-dev
          - zlib1g-dev

    - name: delete directory
      file:
        path: "/usr/local/src/Python-{{ pythonversion }}"
        state: absent

    - name: delete python-{{ pythonversion }} file
      file:
        path: "/usr/local/src/Python-{{ pythonversiona }}.tgz"
        state: absent

    - name: download python-{{ pythonversion }}
      ansible.builtin.get_url:
        url: https://www.python.org/ftp/python/{{ pythonversion }}/Python-{{ pythonversiona }}.tgz
        dest: /usr/local/src/Python-{{ pythonversiona }}.tgz

    - name: extract python-{{ pythonversiona }} file
      ansible.builtin.unarchive:
        src:  /usr/local/src/Python-{{ pythonversiona }}.tgz
        dest: /usr/local/src/
        remote_src: yes

    - name: configure python-{{ pythonversiona }}
      shell:  ./configure --enable-optimizations --with-lto
      args:
        chdir: /usr/local/src/Python-{{ pythonversiona }}

    - name: make python-{{ pythonversiona }} with {{ ansible_facts['processor_nproc'] }} CPUs
      shell: make -j{{ ansible_facts['processor_nproc'] }}
      args:
        chdir: /usr/local/src/Python-{{ pythonversiona }}

    - name: make altinstall python-{{ pythonversiona }} with {{ ansible_facts['processor_nproc'] }} CPUs
      shell:  make -j{{ ansible_facts['processor_nproc'] }} altinstall
      args:
        chdir: /usr/local/src/Python-{{ pythonversiona }}

    - name: pip3.15 self-update
      shell: pip3.15 install --upgrade pip