---
- name: Install Visual Studio Code using DEB822 Format
  hosts: all
  become: true
  tasks:

    - name: Ensure dependencies are installed
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Download VS Code GPG key
      ansible.builtin.get_url:
        url: https://packages.microsoft.com/keys/microsoft.asc
        dest: /usr/share/keyrings/microsoft.asc
        mode: '0644'

    - name: Configure VS Code DEB822 repository
      ansible.builtin.deb822_repository:
        name: vscode
        state: present
        types: [deb]
        uris: https://packages.microsoft.com/repos/code
        suites: stable
        components: main
        signed_by: /usr/share/keyrings/microsoft.asc

    - name: Install Visual Studio Code
      ansible.builtin.apt:
        name: code
        state: present
        update_cache: true